name: CI Status Notifications

on:
  pull_request:
    types: [opened, synchronize]
  workflow_run:
    workflows: ["CI/CD", "CD"]
    types: [completed]
    branches: [develop, main]

jobs:
  notify-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI to complete
        if: github.event_name == 'pull_request'
        uses: fountainhead/action-wait-for-check@v1.1.0
        id: wait-for-ci
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: "vue-checks"  
          ref: ${{ github.event.pull_request.head.sha }}
          timeoutSeconds: 1800  
          intervalSeconds: 10    

      - name: Get PR info for workflow_run
        id: get-pr
        if: github.event_name == 'workflow_run'
        run: |
          PR_NUMBER=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_commit.id }}/pulls" | \
            jq -r '.[0].number')
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          
          if [ "$PR_NUMBER" != "null" ]; then
            PR_TITLE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER" | \
              jq -r '.title')
            echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
            PR_AUTHOR=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER" | \
              jq -r '.user.login')
            echo "pr_author=$PR_AUTHOR" >> $GITHUB_OUTPUT
          fi

      - name: Send CI result notification via curl
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            CONCLUSION="${{ github.event.workflow_run.conclusion }}"
            if [ "$CONCLUSION" = "success" ]; then
              STATUS="✅ **ПРОВЕРКИ ПРОЙДЕНЫ**"
              RESULT_LINE="🟢 **Можно мержить!**"
            else
              STATUS="❌ **ПРОВЕРКИ УПАЛИ**"
              RESULT_LINE="🔴 **Нужно исправить ошибки!**"
            fi
            WORKFLOW_LINE="⚙️ **Workflow:** ${{ github.event.workflow_run.name }}%0A📊 **Результат:** $CONCLUSION"
          else
            CONCLUSION="${{ steps.wait-for-ci.outputs.conclusion }}"
            if [ "$CONCLUSION" = "success" ]; then
              STATUS="✅ **ПРОВЕРКИ ПРОЙДЕНЫ**"
              RESULT_LINE="🟢 **Можно мержить!**"
            elif [ "$CONCLUSION" = "failure" ]; then
              STATUS="❌ **ПРОВЕРКИ УПАЛИ**"
              RESULT_LINE="🔴 **Нужно исправить ошибки!**"
            else
              STATUS="⏰ **ПРОВЕРКИ ЗАНЯЛИ СЛИШКОМ МНОГО ВРЕМЕНИ**"
              RESULT_LINE=""
            fi
            WORKFLOW_LINE=""
          fi

          PR_TITLE="${{ github.event.pull_request.title || steps.get-pr.outputs.pr_title || github.event.workflow_run.display_title }}"
          PR_NUMBER="${{ github.event.pull_request.number || steps.get-pr.outputs.pr_number }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login || steps.get-pr.outputs.pr_author || github.event.workflow_run.actor.login }}"
          
          if [ -n "$PR_NUMBER" ]; then
            PR_LINK="🔗 https://github.com/${{ github.repository }}/pull/$PR_NUMBER"
          else
            PR_LINK="🔗 ${{ github.event.workflow_run.html_url }}"
          fi

          MESSAGE="$STATUS%0A%0A"
          MESSAGE="$MESSAGE📦 **Репозиторий:** ${{ github.repository }}%0A"
          MESSAGE="$MESSAGE📌 **PR:** $PR_TITLE #$PR_NUMBER%0A"
          MESSAGE="$MESSAGE👤 **Автор:** $PR_AUTHOR%0A"
          MESSAGE="$MESSAGE%0A"
          
          if [ -n "$WORKFLOW_LINE" ]; then
            MESSAGE="$MESSAGE$WORKFLOW_LINE%0A"
          fi
          
          if [ -n "$RESULT_LINE" ]; then
            MESSAGE="$MESSAGE$RESULT_LINE%0A"
          fi
          
          MESSAGE="$MESSAGE%0A$PR_LINK"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d message_thread_id="${{ secrets.TELEGRAM_THREAD_TOPIC }}" \
            -d text="$MESSAGE" \
            -d parse_mode="Markdown"