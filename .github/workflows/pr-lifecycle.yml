name: PR Notifications

on:
  pull_request:
    types: [opened, reopened, closed]
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Telegram notify
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.event.action }}" = "opened" ]; then
              TEXT="🆕 PR opened: ${{ github.event.pull_request.title }}"
            elif [ "${{ github.event.action }}" = "reopened" ]; then
              TEXT="🔄 PR reopened: ${{ github.event.pull_request.title }}"
            elif [ "${{ github.event.action }}" = "closed" ]; then
              if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
                TEXT="🎉 PR merged: ${{ github.event.pull_request.title }}"
              else
                TEXT="❌ PR closed: ${{ github.event.pull_request.title }}"
              fi
            fi
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            if [ "${{ github.event.review.state }}" = "approved" ]; then
              TEXT="✅ PR approved: ${{ github.event.pull_request.title }}"
            elif [ "${{ github.event.review.state }}" = "changes_requested" ]; then
              TEXT="🔄 Changes requested: ${{ github.event.pull_request.title }}"
            else
              TEXT="💬 New review: ${{ github.event.pull_request.title }}"
            fi
          fi

          FULL_TEXT="$TEXT%0A%0A"
          FULL_TEXT="$FULL_TEXT📦 **Репозиторий:** ${{ github.repository }}%0A"
          FULL_TEXT="$FULL_TEXT👤 **Автор:** ${{ github.event.pull_request.user.login }}%0A"
          FULL_TEXT="$FULL_TEXT🌿 **Ветка:** ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}%0A"
          
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            FULL_TEXT="$FULL_TEXT👥 **Ревьювер:** ${{ github.event.review.user.login }}%0A"
          fi
          
          FULL_TEXT="$FULL_TEXT%0A🔗 ${{ github.event.pull_request.html_url }}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d message_thread_id="${{ secrets.TELEGRAM_THREAD_TOPIC }}" \
            -d text="$FULL_TEXT" \
            -d parse_mode="Markdown"