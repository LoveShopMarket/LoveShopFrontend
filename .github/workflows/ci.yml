name: CI for Vue

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  vue-checks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './vue-project/package-lock.json'

      - name: Debug - check files
        run: |
          echo "📂 Current directory:"
          pwd
          echo "📂 Listing files:"
          ls -la
          echo "📂 Checking vue-project:"
          ls -la vue-project/
          echo "📂 Checking package-lock.json:"
          ls -la vue-project/package-lock.json || echo "❌ package-lock.json not found!"

      - name: Install dependencies
        working-directory: ./vue-project
        run: |
          if [ -f "package-lock.json" ]; then
            echo "📦 Installing with npm ci..."
            npm ci
          else
            echo "⚠️ package-lock.json not found, running npm install..."
            npm install
          fi

      - name: Check code formatting with ESLint
        working-directory: ./vue-project
        run: |
          echo "🔍 Running ESLint..."
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f ".eslintrc" ]; then
            npx eslint . --ext .vue,.js,.ts --max-warnings 0
          else
            echo "⚠️ ESLint config not found, skipping..."
          fi

      - name: TypeScript type checking
        working-directory: ./vue-project
        run: |
          echo "🔍 Running TypeScript type checking..."
          if grep -q "\"type-check\"" package.json; then
            npm run type-check
          else
            echo "⚠️ type-check script not found, running tsc directly..."
            npx tsc --noEmit || echo "⚠️ TypeScript check failed or not configured"
          fi

      - name: Run tests with coverage
        working-directory: ./vue-project
        run: |
          echo "🧪 Running tests with coverage..."
          if grep -q "\"test:unit\"" package.json; then
            npm run test:unit -- --coverage
          else
            echo "⚠️ Tests not configured yet"
          fi
        continue-on-error: true

      - name: Build project
        working-directory: ./vue-project
        run: |
          echo "🏗️ Building project..."
          if grep -q "\"build\"" package.json; then
            npm run build
          else
            echo "⚠️ Build script not found, checking for vue-cli or vite..."
            if [ -f "vue.config.js" ]; then
              npx vue-cli-service build
            elif [ -f "vite.config.ts" ] || [ -f "vite.config.js" ]; then
              npx vite build
            else
              echo "❌ No build configuration found!"
              exit 1
            fi
          fi
        continue-on-error: false